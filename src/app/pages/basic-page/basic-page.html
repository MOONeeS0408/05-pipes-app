<section class="mx-10">
  <h1 class="text-2xl font-bold flex justify-center">Pipes Basicos</h1>
  <h3 class="text-xl font-thin flex justify-center">Pipes incluidos en Angular</h3>
</section>

<div class="stats shadow stats-horizontal flex justify-around">
  <div class="stat place-items-center">
    <div class="stat-title">Lower Case Pipe</div>
    <div class="stat-value">{{ nameLower() | lowercase }}</div>
    <div class="stat-desc">{{ nameLower() }}</div>
  </div>

  <div class="stat place-items-center">
    <div class="stat-title">Upper Case Pipe</div>
    <div class="stat-value text-secondary">{{ nameUpper() | uppercase }}</div>
    <div class="stat-desc text-secondary">{{ nameUpper() }}</div>
  </div>

  <div class="stat place-items-center">
    <div class="stat-title">Title Case Pipe</div>
    <div class="stat-value">{{ fullName() | titlecase }}</div>
    <div class="stat-desc">↘︎{{ fullName() }}</div>
  </div>
</div>
